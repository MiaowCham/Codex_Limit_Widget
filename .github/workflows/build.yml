name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      version:
        description: "打包版本号（x.y.z；可选 v 前缀）"
        required: true
        default: "0.2.3"
        type: string

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build CodexLimitWidget.slnx -c Release
      - run: dotnet test CodexLimitWidget.slnx -c Release --no-build

  package-windows:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: windows-latest
    env:
      PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build self-contained installer
        shell: pwsh
        run: |
          $version = $env:PACKAGE_VERSION.TrimStart('v')
          ./installer/build-windows.ps1 -Version $version
      - uses: actions/upload-artifact@v4
        with:
          name: CodexLimitWidget-windows-x64-setup
          path: dist/*.exe
          if-no-files-found: error

  package-linux:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    env:
      PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build binary and Debian package
        run: printf '1\n1\n3\n%s\n' "${PACKAGE_VERSION#v}" | bash installer/build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: CodexLimitWidget-linux-x64
          path: |
            publish/linux-x64/app/CodexLimitWidget.App
            dist/*.deb
          if-no-files-found: error

  package-macos:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: macos-latest
    env:
      PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            architecture_choice: 1
          - rid: osx-x64
            architecture_choice: 2
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build ad-hoc signed app
        run: printf '1\n%s\n2\n%s\n' "${{ matrix.architecture_choice }}" "${PACKAGE_VERSION#v}" | bash installer/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "CodexLimitWidget-${{ matrix.rid }}-app"
          path: dist/*.app
          if-no-files-found: error
