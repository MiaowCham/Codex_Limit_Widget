name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      version:
        description: "打包版本号（x.y.z[-suffix] 或 x.y.z.w[-suffix]；可选 v 前缀）"
        required: true
        default: "1.0.0"
        type: string

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Resolve CI informational version
        shell: pwsh
        run: |
          . ./installer/Versioning.ps1
          $stored = Get-CodexStoredVersion -RepositoryRoot $env:GITHUB_WORKSPACE
          $ciVersion = Add-CodexCommitHash -InformationalVersion $stored.InformationalVersion -CommitHash $env:GITHUB_SHA
          "CI_INFORMATIONAL_VERSION=$ciVersion" >> $env:GITHUB_ENV
      - name: Test PowerShell versioning
        shell: pwsh
        run: ./installer/test-versioning.ps1
      - name: Test Bash versioning
        shell: bash
        run: bash installer/test-versioning.sh
      - name: Build
        shell: pwsh
        run: dotnet build CodexLimitWidget.slnx -c Release "-p:InformationalVersion=$env:CI_INFORMATIONAL_VERSION"
      - run: dotnet test CodexLimitWidget.slnx -c Release --no-build

  package-windows:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: windows-latest
    env:
      PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Resolve package versions
        shell: pwsh
        run: |
          . ./installer/Versioning.ps1
          $resolved = Resolve-CodexVersion -Version $env:PACKAGE_VERSION
          $ciVersion = Add-CodexCommitHash -InformationalVersion $resolved.InformationalVersion -CommitHash $env:GITHUB_SHA
          "PACKAGE_VERSION=$($resolved.Version)" >> $env:GITHUB_ENV
          "CI_INFORMATIONAL_VERSION=$ciVersion" >> $env:GITHUB_ENV
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Download Inno Setup translations
        shell: pwsh
        run: ./installer/download-inno-languages.ps1
      - name: Build Slim and Full installers
        shell: pwsh
        run: |
          ./installer/build-windows.ps1 -Version $env:PACKAGE_VERSION -InformationalVersion $env:CI_INFORMATIONAL_VERSION
          $expected = @(
            "CodexLimitWidget-$env:PACKAGE_VERSION-Windows-x64-Slim-Setup.exe",
            "CodexLimitWidget-$env:PACKAGE_VERSION-Windows-x64-Full-Setup.exe"
          ) | Sort-Object
          $actual = @(Get-ChildItem dist -File -Filter *.exe | Select-Object -ExpandProperty Name | Sort-Object)
          if (@(Compare-Object $expected $actual).Count -ne 0 -or $actual.Count -ne 2) {
            throw "Expected exactly two Windows installers; found: $($actual -join ', ')"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: CodexLimitWidget-windows-x64-setups
          path: |
            dist/CodexLimitWidget-*-Windows-x64-Slim-Setup.exe
            dist/CodexLimitWidget-*-Windows-x64-Full-Setup.exe
          if-no-files-found: error

  package-linux:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    env:
      PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Resolve package versions
        shell: pwsh
        run: |
          . ./installer/Versioning.ps1
          $resolved = Resolve-CodexVersion -Version $env:PACKAGE_VERSION
          $ciVersion = Add-CodexCommitHash -InformationalVersion $resolved.InformationalVersion -CommitHash $env:GITHUB_SHA
          "PACKAGE_VERSION=$($resolved.Version)" >> $env:GITHUB_ENV
          "CI_INFORMATIONAL_VERSION=$ciVersion" >> $env:GITHUB_ENV
      - name: Build binary and Debian package
        run: |
          export INFORMATIONAL_VERSION="$CI_INFORMATIONAL_VERSION"
          printf '1\n1\n3\n%s\n' "$PACKAGE_VERSION" | bash installer/build-linux.sh
      - name: Archive standalone binary with Unix permissions
        run: |
          tar -C publish/linux-x64/app -czf dist/CodexLimitWidget-linux-x64.tar.gz CodexLimitWidget.App
      - uses: actions/upload-artifact@v4
        with:
          name: CodexLimitWidget-linux-x64
          path: |
            dist/CodexLimitWidget-linux-x64.tar.gz
            dist/*.deb
          if-no-files-found: error

  package-macos:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: macos-latest
    env:
      PACKAGE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            architecture_choice: 1
          - rid: osx-x64
            architecture_choice: 2
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Resolve package versions
        shell: pwsh
        run: |
          . ./installer/Versioning.ps1
          $resolved = Resolve-CodexVersion -Version $env:PACKAGE_VERSION
          $ciVersion = Add-CodexCommitHash -InformationalVersion $resolved.InformationalVersion -CommitHash $env:GITHUB_SHA
          "PACKAGE_VERSION=$($resolved.Version)" >> $env:GITHUB_ENV
          "CI_INFORMATIONAL_VERSION=$ciVersion" >> $env:GITHUB_ENV
      - name: Build ad-hoc signed app
        run: |
          export INFORMATIONAL_VERSION="$CI_INFORMATIONAL_VERSION"
          printf '1\n%s\n2\n%s\n' "${{ matrix.architecture_choice }}" "$PACKAGE_VERSION" | bash installer/build-macos.sh
      - uses: actions/upload-artifact@v4
        with:
          name: "CodexLimitWidget-${{ matrix.rid }}-zip"
          # A ZIP created by ditto retains the executable mode inside the app bundle.
          path: dist/*.zip
          if-no-files-found: error
