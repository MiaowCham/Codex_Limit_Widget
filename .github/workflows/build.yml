name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore CodexLimitWidget.slnx
      - run: dotnet build CodexLimitWidget.slnx -c Release --no-restore
      - run: dotnet test CodexLimitWidget.slnx -c Release --no-build

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Publish App and CLI
        run: |
          dotnet publish CodexLimitWidget.App/CodexLimitWidget.App.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o publish/${{ matrix.rid }}/app
          dotnet publish CodexLimitWidget.Cli/CodexLimitWidget.Cli.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o publish/${{ matrix.rid }}/cli
      - uses: actions/upload-artifact@v4
        with:
          name: CodexLimitWidget-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}
          if-no-files-found: error
