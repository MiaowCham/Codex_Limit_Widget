name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') {
            $version = $Matches[1]
            Write-Host "Version from tag: $version"
          } else {
            $xml = [xml](Get-Content -Raw -LiteralPath CodexLimitWidget.csproj)
            $version = @($xml.Project.PropertyGroup.Version | Where-Object { $_ })[0]
            Write-Host "Version from project: $version"
          }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must use x.y.z format: $version"
          }
          "value=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Publish release build
        shell: pwsh
        run: |
          dotnet publish CodexLimitWidget.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:PublishSingleFile=false `
            -p:DebugType=None -p:DebugSymbols=false `
            -p:Version=${{ steps.version.outputs.value }} `
            -p:InformationalVersion=${{ steps.version.outputs.value }} `
            -p:AssemblyVersion=${{ steps.version.outputs.value }}.0 `
            -p:FileVersion=${{ steps.version.outputs.value }}.0 `
            -o publish/release
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publish single-file build
        shell: pwsh
        run: |
          dotnet publish CodexLimitWidget.csproj `
            -c Release -r win-x64 --self-contained false `
            -p:PublishSingleFile=true `
            -p:DebugType=None -p:DebugSymbols=false `
            -p:Version=${{ steps.version.outputs.value }} `
            -p:InformationalVersion=${{ steps.version.outputs.value }} `
            -p:AssemblyVersion=${{ steps.version.outputs.value }}.0 `
            -p:FileVersion=${{ steps.version.outputs.value }}.0 `
            -o publish/single-file
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify release outputs
        shell: pwsh
        run: |
          $pdbFiles = @(Get-ChildItem -Recurse -File publish -Filter *.pdb)
          if ($pdbFiles.Count -gt 0) {
            throw "Unexpected PDB files: $($pdbFiles.FullName -join ', ')"
          }
          $app = Get-Item publish/release/CodexLimitWidget.exe
          if ($app.VersionInfo.ProductVersion -ne '${{ steps.version.outputs.value }}') {
            throw "Unexpected product version: $($app.VersionInfo.ProductVersion)"
          }
          if ($app.VersionInfo.FileVersion -ne '${{ steps.version.outputs.value }}.0') {
            throw "Unexpected file version: $($app.VersionInfo.FileVersion)"
          }

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = (Get-Command iscc -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          }
          if (-not (Test-Path $iscc)) {
            throw 'Inno Setup 6 ISCC.exe was not found on the runner.'
          }
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.value }}" installer\CodexLimitWidget.CI.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexLimitWidget-v${{ steps.version.outputs.value }}-single-file
          path: publish/single-file/CodexLimitWidget.exe
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexLimitWidget-v${{ steps.version.outputs.value }}-Setup
          path: dist/CodexLimitWidget-*-Setup.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Codex Limit Widget v${{ steps.version.outputs.value }}
          prerelease: true
          files: |
            dist/CodexLimitWidget-*-Setup.exe
            publish/single-file/CodexLimitWidget.exe
